/* ── Claude API ── */
async function claude(system, user) {
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages:[{role:"user",content:user}]})
  });
  const d = await r.json();
  return d.content?.[0]?.text || "";
}

/* ── Pillar 2: AI Sessions ── */
function AIComms({ sel, pick }) {
  const [p, setP] = useState(sel||PATIENTS[0]);
  const [patLogs, setPatLogs] = useState(()=>PATIENTS.reduce((a,pt)=>({...a,[pt.id]:[...pt.logs.map(l=>({...l}))]}),{}));
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  useEffect(()=>{ if(sel) setP(sel); },[sel]);

  const logs = patLogs[p.id]||[];

  const summarise = async(log,idx)=>{
    setLoading(true); setErr("");
    try {
      const ai = await claude(
        "You are a clinical assistant. Summarise the patient's session log in 3-5 professional sentences for their therapist. Focus on emotional indicators, progress, and suggested discussion points. Be concise and clinically relevant.",
        `Patient: ${p.name}\nDiagnosis: ${p.dx}\nMood: ${log.mood}\n\nLog: ${log.text}`
      );
      setPatLogs(prev=>{const u={...prev};u[p.id]=u[p.id].map((l,i)=>i===idx?{...l,ai}:l);return u;});
    } catch(e){ setErr("Could not reach Claude API. Check your connection."); }
    setLoading(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><div style={{fontSize:22,fontWeight:600}}>AI Session Communication</div><div style={{fontSize:13,color:"#6b7280",marginTop:2}}>Patient logs → Claude AI → Therapist summaries</div></div>

      <div style={{display:"flex",gap:0,borderBottom:"0.5px solid #e5e7eb"}}>
        {PATIENTS.map(pt=>(
          <div key={pt.id} onClick={()=>setP(pt)} style={{padding:"7px 14px",fontSize:13,cursor:"pointer",color:p.id===pt.id?C.blue.b600:"#6b7280",borderBottom:p.id===pt.id?`2px solid ${C.blue.b400}`:"2px solid transparent",fontWeight:p.id===pt.id?500:400,marginBottom:-0.5,display:"flex",alignItems:"center",gap:6}}>
            {pt.name.split(" ")[0]}
            {(patLogs[pt.id]||[]).length>0&&<span style={{width:6,height:6,borderRadius:"50%",background:C.teal.b400,display:"inline-block"}}/>}
          </div>
        ))}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.blue.b50,borderRadius:8,border:`0.5px solid ${C.blue.b100}`}}>
        <Av ini={p.ini} c={p.c} sz={32}/>
        <div><div style={{fontSize:13,fontWeight:500}}>{p.name}</div><div style={{fontSize:12,color:"#6b7280"}}>{p.dx} · {p.id}</div></div>
        <div style={{marginLeft:"auto"}}><Pill c={C.blue}>{logs.length} log{logs.length!==1?"s":""}</Pill></div>
      </div>

      {logs.length===0&&(
        <Card sx={{textAlign:"center",padding:40,color:"#9ca3af"}}>
          <i className="ti ti-file-off" style={{fontSize:32,marginBottom:10,display:"block"}}/>
          <div style={{fontSize:14}}>No session logs yet for {p.name.split(" ")[0]}</div>
          <div style={{fontSize:12,marginTop:4}}>Ask the patient to submit their 60-second log.</div>
        </Card>
      )}

      {logs.map((log,idx)=>(
        <Card key={idx}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <Pill c={log.mood==="Better"?C.teal:log.mood==="Harder"?C.coral:C.amber}>
              {log.mood==="Better"?"😌":log.mood==="Harder"?"😔":"😐"} {log.mood}
            </Pill>
            <span style={{fontSize:12,color:"#9ca3af",marginLeft:"auto"}}>{log.date}</span>
          </div>
          <div style={{fontSize:13,color:"#374151",lineHeight:1.7,fontStyle:"italic",marginBottom:14,background:"#f9fafb",borderRadius:8,padding:"10px 12px"}}>"{log.text}"</div>
          {log.ai?(
            <div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:6,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-sparkles" style={{color:C.blue.b600}}/> Claude AI summary for provider</div>
              <div style={{background:"#eff6ff",borderRadius:8,padding:"10px 12px",fontSize:13,lineHeight:1.7,color:"#374151",borderLeft:`2px solid ${C.blue.b400}`}}>{log.ai}</div>
            </div>
          ):(
            <Btn primary onClick={()=>summarise(log,idx)} sx={{fontSize:12}}>
              {loading?<><i className="ti ti-loader"/> Generating…</>:<><i className="ti ti-sparkles"/> Generate AI summary</>}
            </Btn>
          )}
        </Card>
      ))}
      {err&&<div style={{fontSize:13,color:C.coral.b600,background:C.coral.b50,padding:"10px 14px",borderRadius:8}}>{err}</div>}
    </div>
  );
}

/* ── Pillar 3: Health Literacy ── */
function HealthLiteracy() {
  const [plans, setPlans] = useState(CARE_PLANS_INIT);
  const [sel, setSel] = useState(0);
  const [loading, setLoading] = useState(false);
  const [lang, setLang] = useState("English");
  const [newTxt, setNewTxt] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const LANGS = ["English","Spanish","Mandarin","Hindi","Arabic","French","Portuguese"];
  const plan = plans[sel];

  const simplify = async()=>{
    if(!plan.original) return;
    setLoading(true);
    try {
      const simplified = await claude(
        `You are a health literacy expert. Rewrite the medical instructions below in plain, friendly language the patient can easily understand. Use simple words, short sentences, and bullet points. Patient's language: ${lang}. Output ONLY the simplified text — no preamble.`,
        plan.original
      );
      setPlans(plans.map((p,i)=>i===sel?{...p,simplified,lang}:p));
    } catch(e){}
    setLoading(false);
  };

  const addPlan = ()=>{
    if(!newTxt.trim()) return;
    const np={id:Date.now(),patient:"New Patient",pid:"MB-XXXX",date:"Today",original:newTxt,simplified:"",lang};
    setPlans([...plans,np]); setSel(plans.length); setNewTxt(""); setShowAdd(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:22,fontWeight:600}}>Care Plan Simplifier</div><div style={{fontSize:13,color:"#6b7280",marginTop:2}}>Medical instructions → Claude AI → Patient-friendly language</div></div>
        <Btn primary onClick={()=>setShowAdd(!showAdd)}><i className="ti ti-plus"/> New plan</Btn>
      </div>

      {showAdd&&(
        <Card sx={{background:C.amber.b50,border:`0.5px solid ${C.amber.b100}`}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Paste provider's instructions</div>
          <textarea value={newTxt} onChange={e=>setNewTxt(e.target.value)} placeholder="Enter medical instructions here…" style={{width:"100%",minHeight:100,padding:"10px 12px",borderRadius:8,border:"0.5px solid #e5e7eb",fontSize:13,resize:"vertical",background:"white"}}/>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn primary onClick={addPlan}><i className="ti ti-check"/> Add</Btn>
            <Btn onClick={()=>setShowAdd(false)}>Cancel</Btn>
          </div>
        </Card>
      )}

      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16,alignItems:"start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {plans.map((pl,i)=>(
            <div key={pl.id} onClick={()=>setSel(i)} style={{padding:"10px 12px",borderRadius:8,cursor:"pointer",fontSize:13,background:sel===i?C.amber.b50:"white",border:sel===i?`0.5px solid ${C.amber.b100}`:"0.5px solid #e5e7eb",color:sel===i?C.amber.b600:"#374151"}}>
              <div style={{fontWeight:500}}>{pl.patient}</div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{pl.pid} · {pl.date}</div>
              {pl.simplified&&<span style={{display:"inline-block",marginTop:4}}><Pill c={C.teal}>Simplified</Pill></span>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card>
            <div style={{fontSize:13,fontWeight:500,marginBottom:10,display:"flex",alignItems:"center",gap:8}}><i className="ti ti-clipboard-list" style={{color:"#9ca3af"}}/> Provider's instructions</div>
            <div style={{fontSize:13,lineHeight:1.7,color:"#374151",background:"#f9fafb",padding:"12px 14px",borderRadius:8,whiteSpace:"pre-wrap"}}>{plan.original}</div>
          </Card>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:13,color:"#6b7280"}}>Patient language:</div>
            <select value={lang} onChange={e=>setLang(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"0.5px solid #e5e7eb",fontSize:13}}>
              {LANGS.map(l=><option key={l}>{l}</option>)}
            </select>
            <Btn primary onClick={simplify} sx={{marginLeft:"auto"}}>
              {loading?<><i className="ti ti-loader"/> Simplifying…</>:<><i className="ti ti-language"/> Simplify with Claude</>}
            </Btn>
          </div>
          {plan.simplified?(
            <Card sx={{background:C.teal.b50,border:`0.5px solid ${C.teal.b100}`}}>
              <div style={{fontSize:12,color:C.teal.b600,marginBottom:8,display:"flex",alignItems:"center",gap:6,fontWeight:500}}><i className="ti ti-sparkles"/> Simplified for patient ({plan.lang})</div>
              <div style={{fontSize:14,lineHeight:1.8,color:"#1f2937",whiteSpace:"pre-wrap"}}>{plan.simplified}</div>
              <div style={{marginTop:12,display:"flex",gap:8}}>
                <Btn onClick={()=>navigator.clipboard?.writeText(plan.simplified)}><i className="ti ti-copy"/> Copy</Btn>
                <Btn onClick={simplify}><i className="ti ti-refresh"/> Re-generate</Btn>
              </div>
            </Card>
          ):(
            <Card sx={{textAlign:"center",padding:30,color:"#9ca3af"}}>
              <i className="ti ti-language" style={{fontSize:28,marginBottom:8,display:"block"}}/>
              <div style={{fontSize:13}}>Click "Simplify with Claude" to generate patient-friendly text</div>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── My Log (patient view) ── */
function MyLog() {
  const [pt, setPt] = useState(PATIENTS[0]);
  const [text, setText] = useState("");
  const [mood, setMood] = useState("Better");
  const [done, setDone] = useState(false);
  const [myLogs, setMyLogs] = useState(()=>PATIENTS.reduce((a,p)=>({...a,[p.id]:[...p.logs.map(l=>({...l}))]}),{}));
  const logs = myLogs[pt.id]||[];

  const submit = ()=>{
    if(!text.trim()) return;
    setMyLogs(prev=>({...prev,[pt.id]:[{date:"Jun 15",mood,text,ai:""},...prev[pt.id]]}));
    setText(""); setDone(true); setTimeout(()=>setDone(false),3000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><div style={{fontSize:22,fontWeight:600}}>My Session Log</div><div style={{fontSize:13,color:"#6b7280",marginTop:2}}>Your 60-second check-in after each session</div></div>

      <Card sx={{background:"#f9fafb"}}>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:8}}>Logged in as:</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {PATIENTS.map(p=>(
            <div key={p.id} onClick={()=>setPt(p)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,cursor:"pointer",background:pt.id===p.id?p.c.b50:"white",border:`0.5px solid ${pt.id===p.id?p.c.b100:"#e5e7eb"}`,fontSize:12,color:pt.id===p.id?p.c.b600:"#374151",fontWeight:pt.id===p.id?500:400}}>
              <Av ini={p.ini} c={p.c} sz={20}/>{p.name.split(" ")[0]}
            </div>
          ))}
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card>
            <div style={{fontSize:13,fontWeight:500,marginBottom:12,display:"flex",alignItems:"center",gap:8}}><i className="ti ti-pencil" style={{color:C.teal.b600}}/> How are you feeling, {pt.name.split(" ")[0]}?</div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>Your mood today</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[["Better","😌",C.teal],["Same","😐",C.amber],["Harder","😔",C.coral]].map(([m,e,c])=>(
                <button key={m} onClick={()=>setMood(m)} style={{padding:"7px 14px",borderRadius:20,fontSize:13,cursor:"pointer",border:mood===m?`1.5px solid ${c.b400}`:"0.5px solid #e5e7eb",background:mood===m?c.b50:"white",color:mood===m?c.b600:"#6b7280",fontFamily:"inherit"}}>
                  {e} {m}
                </button>
              ))}
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>What's been happening?</div>
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="How are you feeling? Any changes, breakthroughs, or struggles? Your provider will read this before your next session…" style={{width:"100%",minHeight:100,padding:"10px 12px",borderRadius:8,border:"0.5px solid #e5e7eb",fontSize:13,resize:"none",lineHeight:1.6}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
              <span style={{fontSize:11,color:"#9ca3af"}}>{text.length} chars</span>
              <Btn primary onClick={submit}><i className="ti ti-send"/> Submit log</Btn>
            </div>
            {done&&<div style={{marginTop:10,fontSize:13,color:C.teal.b600,background:C.teal.b50,padding:"8px 12px",borderRadius:8}}>✓ Submitted — your provider will review this before your next session.</div>}
          </Card>
          <Card>
            <div style={{fontSize:13,fontWeight:500,marginBottom:10,display:"flex",alignItems:"center",gap:8}}><i className="ti ti-qrcode" style={{color:C.teal.b600}}/> Your health code</div>
            <div style={{display:"flex",alignItems:"center",gap:12,background:"#f9fafb",borderRadius:8,padding:"12px 14px"}}>
              <i className="ti ti-qrcode" style={{fontSize:22,color:"#9ca3af"}}/>
              <span style={{fontFamily:"monospace",fontSize:18,fontWeight:500,color:C.teal.b600,letterSpacing:"0.1em",flex:1}}>{pt.id}-XLQP</span>
              <Btn onClick={()=>navigator.clipboard?.writeText(`${pt.id}-XLQP`)}><i className="ti ti-copy"/> Copy</Btn>
            </div>
            <div style={{fontSize:12,color:"#9ca3af",marginTop:8}}>Share with any new specialist to give them instant access to your full health profile.</div>
          </Card>
        </div>
        <Card>
          <div style={{fontSize:14,fontWeight:500,marginBottom:14,display:"flex",alignItems:"center",gap:8}}><i className="ti ti-history"/> Past logs</div>
          {logs.length===0&&<div style={{color:"#9ca3af",fontSize:13,textAlign:"center",padding:24}}>No logs submitted yet.</div>}
          <div style={{maxHeight:460,overflowY:"auto"}}>
          {logs.map((log,i)=>(
            <div key={i} style={{borderBottom:i<logs.length-1?"0.5px solid #f3f4f6":"none",paddingBottom:12,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <Pill c={log.mood==="Better"?C.teal:log.mood==="Harder"?C.coral:C.amber}>{log.mood==="Better"?"😌":log.mood==="Harder"?"😔":"😐"} {log.mood}</Pill>
                <span style={{fontSize:11,color:"#9ca3af",marginLeft:"auto"}}>{log.date}</span>
              </div>
              <div style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>{log.text}</div>
              {log.ai&&(
                <div style={{marginTop:8,fontSize:12,background:"#eff6ff",borderLeft:`2px solid ${C.blue.b400}`,borderRadius:6,padding:"8px 10px",color:"#374151",lineHeight:1.6}}>
                  <span style={{fontSize:11,color:C.blue.b600,display:"block",marginBottom:4}}>✦ Provider summary</span>{log.ai}
                </div>
              )}
            </div>
          ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ── Root ── */
function App() {
  const [pg, setPg] = useState("dash");
  const [sel, setSel] = useState(null);
  const go = k => setPg(k);
  const pick = p => setSel(p);

  const views = {
    dash:  <Dashboard go={go} pick={pick}/>,
    pts:   <PatientsList go={go} pick={pick}/>,
    id:    <HealthIdentity sel={sel} pick={pick}/>,
    ai:    <AIComms sel={sel} pick={pick}/>,
    lit:   <HealthLiteracy/>,
    mylog: <MyLog/>,
  };

  return (
    <div style={{display:"flex",height:"100vh",background:"#f3f4f6",fontFamily:"'DM Sans',system-ui,sans-serif",color:"#111"}}>
      <Sidebar pg={pg} go={go}/>
      <main style={{flex:1,overflowY:"auto",padding:28}}>
        {views[pg]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
